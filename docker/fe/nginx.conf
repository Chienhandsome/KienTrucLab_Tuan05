server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Single-page app routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built assets
    location /static/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
